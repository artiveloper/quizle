spring:
  profiles:
    active: test

  datasource:
    url: jdbc:h2:~/quizle;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL5InnoDBDialect

  jwt:
    secret: 1234!@#$

logging.level:
  org.hibernate.SQL: debug
